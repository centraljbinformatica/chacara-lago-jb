<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comanda para imprimir — Chácara Lago JB</title>
  <link rel="icon" href="img/logo.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root{ --azul:#1d3f70; --laranja:#d9641a; --linha:#bcc4cf; --txt:#1f2a37; }
    *{box-sizing:border-box;}
    html,body{margin:0; font-family:'Inter',system-ui,sans-serif; color:var(--txt); background:#e9edf2;}

    /* Barra de ações (some na impressão) */
    .acoes{
      position:sticky; top:0; z-index:5; background:#fff; border-bottom:1px solid #d7dde5;
      padding:12px 16px; display:flex; gap:12px; align-items:center; flex-wrap:wrap;
      box-shadow:0 2px 8px rgba(0,0,0,.05);
    }
    .acoes p{margin:0; font-size:.84rem; color:#6b7480; flex:1; min-width:180px;}
    .acoes b{color:var(--azul);}
    .toggle{display:inline-flex; background:#eef1f5; border-radius:30px; padding:4px; gap:2px;}
    .toggle button{
      font-family:inherit; font-weight:700; font-size:.86rem; cursor:pointer; border:none;
      background:transparent; color:#41506a; border-radius:30px; padding:8px 14px;
    }
    .toggle button.on{background:var(--azul); color:#fff;}
    .btn{
      font-family:inherit; font-weight:700; font-size:.92rem; cursor:pointer;
      border:none; border-radius:10px; padding:11px 18px;
      background:linear-gradient(135deg,#f47a1d,#d9641a); color:#fff;
    }
    .btn.sec{background:#eef1f5; color:#41506a;}

    /* Folha A4 */
    .folha{
      width:210mm; margin:18px auto; background:#fff;
      box-shadow:0 6px 24px rgba(0,0,0,.12);
    }
    .corte{
      text-align:center; font-size:8px; color:#9aa3af; letter-spacing:1px;
      border-top:1.2px dashed #9aa3af; padding-top:1.2mm; height:4mm;
    }

    /* Uma comanda: a altura muda conforme 2, 3 ou 4 por folha */
    .comanda{ padding:5mm 7mm; display:flex; flex-direction:column; overflow:hidden; }
    .per-2 .comanda{ height:141mm; }
    .per-3 .comanda{ height:92mm; }
    .per-4 .comanda{ height:68mm; }

    .cab{display:flex; align-items:center; gap:9px; border-bottom:2.2px solid var(--azul); padding-bottom:4px;}
    .cab img{height:30px;}
    .cab .tit{flex:1;}
    .cab h1{font-family:'Cinzel',serif; color:var(--azul); margin:0; font-size:1.05rem; line-height:1;}
    .cab .sub{font-size:.64rem; color:#6b7480; margin-top:2px;}
    .cab .comanda-tag{
      font-weight:800; color:var(--laranja); border:1.5px solid var(--laranja);
      border-radius:6px; padding:3px 8px; font-size:.68rem; letter-spacing:.4px; white-space:nowrap;
    }
    .per-3 .cab img,.per-4 .cab img{height:24px;}
    .per-3 .cab h1,.per-4 .cab h1{font-size:.92rem;}
    .per-4 .cab .sub{display:none;}

    .topo-campos{display:flex; gap:10px; flex-wrap:wrap; margin:5px 0 2px; font-size:.7rem;}
    .topo-campos .c{flex:1; min-width:80px; display:flex; align-items:flex-end; gap:5px;}
    .topo-campos .c b{white-space:nowrap;}
    .linha-preencher{flex:1; border-bottom:1.1px solid var(--linha); height:1em;}

    /* Itens em colunas (quantas depende do modo) */
    /* min-height:0 deixa a lista encolher dentro do flex e clipar aqui,
       em vez de empurrar o rodapé (pagamento) pra fora e cruzar o corte */
    .grade{margin-top:4px; flex:1; min-height:0; overflow:hidden;}
    .per-2 .grade{column-count:2; column-gap:10px;}
    .per-3 .grade{column-count:3; column-gap:9px;}
    .per-4 .grade{column-count:4; column-gap:8px;}
    .cat{break-inside:avoid; margin-bottom:4px;}
    .cat h2{
      font-family:'Cinzel',serif; color:#fff; background:var(--azul);
      margin:0; padding:2px 6px; border-radius:4px 4px 0 0; letter-spacing:.2px;
    }
    table{width:100%; border-collapse:collapse;}
    td{padding:1.4px 3px; border-bottom:.6px solid #e7ebf0; line-height:1.1; vertical-align:middle;}
    .nome{}
    .nome small{color:#8b95a3;}
    .pcol{text-align:right; color:var(--laranja); font-weight:700; white-space:nowrap;}
    .qcol{text-align:right; white-space:nowrap; width:1%;}
    .qbox{display:inline-block; border:1.1px solid #8b95a3; border-radius:2px; margin-left:2px; vertical-align:middle;}

    /* Tamanhos por modo */
    .per-2 .cat h2{font-size:.66rem;}     .per-2 td{font-size:.66rem;}   .per-2 .nome small{font-size:.58rem;}
    .per-2 .qbox{width:10px; height:12px;}
    .per-3 .cat h2{font-size:.58rem;}     .per-3 td{font-size:.56rem;}   .per-3 .nome small{font-size:.5rem;}
    .per-3 .qbox{width:8px; height:10px;}
    .per-4 .cat h2{font-size:.52rem;}     .per-4 td{font-size:.5rem;}    .per-4 .nome small{display:none;}
    .per-4 .qbox{width:7px; height:8px; margin-left:1.5px;}

    /* Linha de promoção "Drink em dobro" */
    .promo-row td{background:#fdeede;}
    .promo-row .nome{color:#b34d12; font-weight:800;}
    .promo-row .pcol{color:#b34d12;}

    /* Rodapé */
    .rodape{margin-top:4px; border-top:1.4px dashed #9aa3af; padding-top:4px; display:flex; gap:12px; align-items:flex-end;}
    .rodape .bloco{flex:1;}
    .rot{font-weight:700; color:#6b7480; text-transform:uppercase; letter-spacing:.3px; margin-bottom:2px;}
    .per-2 .rot{font-size:.62rem;} .per-3 .rot,.per-4 .rot{font-size:.56rem;}
    .pag-opcoes{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
    .per-2 .pag-opcoes{font-size:.7rem;} .per-3 .pag-opcoes,.per-4 .pag-opcoes{font-size:.6rem;}
    .check{display:inline-block; width:11px; height:11px; border:1.3px solid #41506a; border-radius:3px; vertical-align:-2px; margin-right:4px;}
    .obs-linha{border-bottom:1.1px solid var(--linha); height:1em; margin-top:3px;}
    .total-cx{max-width:150px;}
    .total-linha{display:flex; align-items:flex-end; gap:6px;}
    .total-linha b{color:var(--azul);}
    .per-2 .total-linha{font-size:.9rem;} .per-3 .total-linha,.per-4 .total-linha{font-size:.78rem;}
    .legenda{text-align:center; color:#9aa3af; margin-top:3px;}
    .per-2 .legenda{font-size:.6rem;} .per-3 .legenda,.per-4 .legenda{font-size:.52rem;}

    @media print{
      @page{ size:A4; margin:5mm; }
      html,body{background:#fff;}
      .acoes{display:none !important;}
      .folha{width:auto; margin:0; box-shadow:none;}
      *{-webkit-print-color-adjust:exact; print-color-adjust:exact;}
    }
  </style>
</head>
<body>

  <div class="acoes">
    <p>Escolha quantas comandas por folha, imprima e <b>corte</b>. Teste 2, 3 e 4 pra ver qual tamanho fica melhor.</p>
    <div class="toggle" id="toggle">
      <button data-n="2">2 por folha</button>
      <button data-n="3">3 por folha</button>
      <button data-n="4">4 por folha</button>
    </div>
    <button class="btn sec" onclick="location.href='comanda.html'">↤ Digital</button>
    <button class="btn" onclick="window.print()">🖨️ Imprimir / PDF</button>
  </div>

  <div class="folha per-2" id="folha"></div>

  <script src="menu.js"></script>
  <script>
  (function () {
    function precoNum(p){ return parseFloat(String(p).replace(/\./g,"").replace(",",".")) || 0; }
    function precoFmt(n){ return n.toFixed(2).replace(".",","); }
    function precoPromo(txt){ const m = String(txt).match(/(\d+)(?!.*\d)/); return m ? m[1]+",00" : "0,00"; }

    const NBOX = 5; // quantos quadradinhos por item
    function boxes(){ let s=""; for(let i=0;i<NBOX;i++) s+='<span class="qbox"></span>'; return s; }

    // monta blocos: subgrupos viram categoria única; guarda a promo (ex.: Drinks)
    const blocos = [];
    (CARDAPIO.comida||[]).concat(CARDAPIO.bebida||[]).forEach((g) => {
      const itens = g.subgrupos
        ? g.subgrupos.reduce((a,sg)=>a.concat(sg.itens),[])
        : g.itens;
      blocos.push({ categoria:g.categoria, icone:g.icone||"", promo:g.promo, itens });
    });

    function linha(nome, desc, preco, promo){
      return `<tr class="${promo ? "promo-row" : ""}">
        <td class="nome">${nome}${desc ? `<small> ${desc}</small>` : ""}</td>
        <td class="pcol">${preco}</td>
        <td class="qcol">${boxes()}</td>
      </tr>`;
    }

    const grade = blocos.map((b) => `
      <div class="cat">
        <h2>${b.icone} ${b.categoria}</h2>
        <table><tbody>
          ${b.promo ? linha("Drink em dobro", "2 unidades", precoFmt(precoNum(precoPromo(b.promo))), true) : ""}
          ${b.itens.map((it) => linha(it.nome, it.desc, precoFmt(precoNum(it.preco)), false)).join("")}
        </tbody></table>
      </div>`).join("");

    const comanda = `
      <div class="cab">
        <img src="img/logo.png" alt="" onerror="this.style.display='none'" />
        <div class="tit">
          <h1>Chácara Lago JB</h1>
          <div class="sub">Vila Amazônia, Parintins</div>
        </div>
        <div class="comanda-tag">COMANDA Nº ______</div>
      </div>
      <div class="topo-campos">
        <div class="c"><b>Mesa:</b><span class="linha-preencher"></span></div>
        <div class="c"><b>Garçom:</b><span class="linha-preencher"></span></div>
        <div class="c"><b>Data:</b><span class="linha-preencher"></span></div>
      </div>
      <div class="grade">${grade}</div>
      <div class="rodape">
        <div class="bloco">
          <div class="rot">Pagamento</div>
          <div class="pag-opcoes">
            <span><span class="check"></span>Dinheiro</span>
            <span><span class="check"></span>PIX</span>
            <span><span class="check"></span>Débito</span>
            <span><span class="check"></span>Crédito</span>
          </div>
          <div class="rot" style="margin-top:5px;">Observações</div>
          <div class="obs-linha"></div>
        </div>
        <div class="bloco total-cx">
          <div class="rot">Total a pagar</div>
          <div class="total-linha"><b>R$</b><span class="linha-preencher"></span></div>
        </div>
      </div>
      <div class="legenda">Cada ⬜ = 1 unidade · marque um quadradinho por pedido</div>`;

    const folha = document.getElementById("folha");
    const toggle = document.getElementById("toggle");

    function render(n){
      let html = "";
      for(let i=0;i<n;i++){
        html += `<div class="comanda">${comanda}</div>`;
        if(i < n-1) html += `<div class="corte">✂ &nbsp; corte aqui &nbsp; ✂</div>`;
      }
      folha.innerHTML = html;
      folha.className = "folha per-" + n;
      toggle.querySelectorAll("button").forEach((b) => b.classList.toggle("on", b.dataset.n == n));
    }

    toggle.addEventListener("click", (e) => {
      const b = e.target.closest("button[data-n]");
      if (b) render(parseInt(b.dataset.n, 10));
    });

    render(2); // começa com 2 por folha
  })();
  </script>
</body>
</html>
