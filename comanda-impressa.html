<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comanda para imprimir — Chácara Lago JB</title>
  <link rel="icon" href="img/logo.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root{ --azul:#1d3f70; --laranja:#d9641a; --linha:#bcc4cf; --txt:#1f2a37; }
    *{box-sizing:border-box;}
    html,body{margin:0; font-family:'Inter',system-ui,sans-serif; color:var(--txt); background:#e9edf2;}

    /* Barra de ações (some na impressão) */
    .acoes{
      position:sticky; top:0; z-index:5; background:#fff; border-bottom:1px solid #d7dde5;
      padding:12px 16px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;
      box-shadow:0 2px 8px rgba(0,0,0,.05);
    }
    .acoes p{margin:0; font-size:.84rem; color:#6b7480; flex:1; min-width:200px;}
    .acoes b{color:var(--azul);}
    .btn{
      font-family:inherit; font-weight:700; font-size:.92rem; cursor:pointer;
      border:none; border-radius:10px; padding:11px 18px;
      background:linear-gradient(135deg,#f47a1d,#d9641a); color:#fff;
    }
    .btn.sec{background:#eef1f5; color:#41506a;}

    /* Folha A4 com 2 comandas (cada uma = meia folha) */
    .folha{
      width:210mm; margin:18px auto; background:#fff;
      box-shadow:0 6px 24px rgba(0,0,0,.12);
    }
    .corte{
      text-align:center; font-size:.66rem; color:#9aa3af; letter-spacing:1px;
      border-top:1.4px dashed #9aa3af; margin:0 8mm;
    }

    /* Uma comanda = ~148mm de altura (metade do A4) */
    .comanda{ padding:7mm 8mm; height:148mm; display:flex; flex-direction:column; }

    .cab{display:flex; align-items:center; gap:9px; border-bottom:2.5px solid var(--azul); padding-bottom:5px;}
    .cab img{height:30px;}
    .cab .tit{flex:1;}
    .cab h1{font-family:'Cinzel',serif; color:var(--azul); margin:0; font-size:1.05rem; line-height:1;}
    .cab .sub{font-size:.66rem; color:#6b7480; margin-top:2px;}
    .cab .comanda-tag{
      font-weight:800; color:var(--laranja); border:1.6px solid var(--laranja);
      border-radius:6px; padding:3px 8px; font-size:.7rem; letter-spacing:.5px; white-space:nowrap;
    }

    .topo-campos{display:flex; gap:12px; flex-wrap:wrap; margin:6px 0 3px; font-size:.72rem;}
    .topo-campos .c{flex:1; min-width:90px; display:flex; align-items:flex-end; gap:5px;}
    .topo-campos .c b{white-space:nowrap;}
    .linha-preencher{flex:1; border-bottom:1.2px solid var(--linha); height:1em;}

    /* itens em 3 colunas, bem compacto */
    .grade{column-count:3; column-gap:9px; margin-top:5px; flex:1;}
    .cat{break-inside:avoid; margin-bottom:5px;}
    .cat h2{
      font-family:'Cinzel',serif; color:#fff; background:var(--azul);
      font-size:.66rem; margin:0; padding:2px 6px; border-radius:4px 4px 0 0; letter-spacing:.2px;
    }
    table{width:100%; border-collapse:collapse;}
    td{padding:1.5px 4px; font-size:.66rem; border-bottom:.6px solid #e7ebf0; line-height:1.1;}
    .qcol{width:20px; text-align:center;}
    .qbox{display:inline-block; width:16px; height:13px; border:1.2px solid #8b95a3; border-radius:3px;}
    .nome small{color:#8b95a3; font-size:.58rem;}
    .pcol{width:34px; text-align:right; color:var(--laranja); font-weight:700; white-space:nowrap;}

    /* rodapé */
    .rodape{margin-top:5px; border-top:1.5px dashed #9aa3af; padding-top:5px; display:flex; gap:14px; align-items:flex-end;}
    .rodape .bloco{flex:1;}
    .rot{font-size:.62rem; font-weight:700; color:#6b7480; text-transform:uppercase; letter-spacing:.3px; margin-bottom:3px;}
    .pag-opcoes{display:flex; gap:10px; font-size:.7rem; align-items:center; flex-wrap:wrap;}
    .check{display:inline-block; width:12px; height:12px; border:1.4px solid #41506a; border-radius:3px; vertical-align:-2px; margin-right:4px;}
    .obs-linha{border-bottom:1.2px solid var(--linha); height:1.05em; margin-top:4px;}
    .total-cx{max-width:150px;}
    .total-linha{display:flex; align-items:flex-end; gap:6px; font-size:.9rem;}
    .total-linha b{font-size:1rem; color:var(--azul);}

    @media print{
      @page{ size:A4; margin:0; }
      html,body{background:#fff;}
      .acoes{display:none !important;}
      .folha{width:auto; margin:0; box-shadow:none;}
      *{-webkit-print-color-adjust:exact; print-color-adjust:exact;}
    }
  </style>
</head>
<body>

  <div class="acoes">
    <p>Comanda <b>2 por folha</b> para preencher à mão. Imprima, <b>corte no meio</b> e monte o bloquinho. Pode também <b>“Salvar como PDF”</b>.</p>
    <button class="btn sec" onclick="location.href='comanda.html'">↤ Comanda digital</button>
    <button class="btn" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
  </div>

  <div class="folha">
    <div class="comanda" id="comanda-1"></div>
    <div class="corte">✂ &nbsp; corte aqui &nbsp; ✂</div>
    <div class="comanda" id="comanda-2"></div>
  </div>

  <script src="menu.js"></script>
  <script>
  (function () {
    function precoNum(p){ return parseFloat(String(p).replace(/\./g,"").replace(",",".")) || 0; }
    function precoFmt(n){ return n.toFixed(2).replace(".",","); }

    // monta blocos: trata subgrupos como categoria única
    const blocos = [];
    (CARDAPIO.comida||[]).concat(CARDAPIO.bebida||[]).forEach((g) => {
      const itens = g.subgrupos
        ? g.subgrupos.reduce((a,sg)=>a.concat(sg.itens),[])
        : g.itens;
      blocos.push({ categoria:g.categoria, icone:g.icone||"", itens });
    });

    const grade = blocos.map((b) => `
      <div class="cat">
        <h2>${b.icone} ${b.categoria}</h2>
        <table><tbody>
          ${b.itens.map((it) => `
            <tr>
              <td class="qcol"><span class="qbox"></span></td>
              <td class="nome">${it.nome}${it.desc ? `<small> ${it.desc}</small>` : ""}</td>
              <td class="pcol">${precoFmt(precoNum(it.preco))}</td>
            </tr>`).join("")}
        </tbody></table>
      </div>`).join("");

    const comanda = `
      <div class="cab">
        <img src="img/logo.png" alt="" onerror="this.style.display='none'" />
        <div class="tit">
          <h1>Chácara Lago JB</h1>
          <div class="sub">Vila Amazônia, Parintins</div>
        </div>
        <div class="comanda-tag">COMANDA Nº ______</div>
      </div>

      <div class="topo-campos">
        <div class="c"><b>Mesa:</b><span class="linha-preencher"></span></div>
        <div class="c"><b>Garçom:</b><span class="linha-preencher"></span></div>
        <div class="c"><b>Data:</b><span class="linha-preencher"></span></div>
      </div>

      <div class="grade">${grade}</div>

      <div class="rodape">
        <div class="bloco">
          <div class="rot">Pagamento</div>
          <div class="pag-opcoes">
            <span><span class="check"></span>Dinheiro</span>
            <span><span class="check"></span>PIX</span>
            <span><span class="check"></span>Débito</span>
            <span><span class="check"></span>Crédito</span>
          </div>
          <div class="rot" style="margin-top:6px;">Observações</div>
          <div class="obs-linha"></div>
        </div>
        <div class="bloco total-cx">
          <div class="rot">Total a pagar</div>
          <div class="total-linha"><b>R$</b><span class="linha-preencher"></span></div>
        </div>
      </div>`;

    document.getElementById("comanda-1").innerHTML = comanda;
    document.getElementById("comanda-2").innerHTML = comanda;
  })();
  </script>
</body>
</html>
